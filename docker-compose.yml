services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chief}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chief_secret_2024}
      POSTGRES_DB: ${POSTGRES_DB:-chief_of_staff}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chief}"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  fastapi:
    build: .
    restart: unless-stopped
    # 开发时取消注释 --reload；生产保持当前命令
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers ${UVICORN_WORKERS:-2}
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=postgres,redis,fastapi,streamlit,localhost,127.0.0.1
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G

  celery-worker:
    build: .
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --pool=solo
    env_file: .env
    environment:
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=postgres,redis,fastapi,streamlit,localhost,127.0.0.1
    volumes:
      - .:/app
      - ./backups:/backups
    depends_on:
      fastapi:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G

  celery-beat:
    build: .
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      fastapi:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  streamlit:
    build: .
    restart: unless-stopped
    command: streamlit run streamlit_app/app.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true
    ports:
      - "8501:8501"
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      fastapi:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  pgdata:
  redisdata:
